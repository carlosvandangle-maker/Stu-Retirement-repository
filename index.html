<!DOCTYPE html>
<html>

<head>
  <title>Stu's Retirement Countdown</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
      padding-top: 80px;
    }

    #bg-title {
      position: fixed;
      top: 10px;
      left: 15px;
      font-size: 4rem;
      color: rgba(0,0,0,0.08);
    }

    #moodEmoji {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 8rem;
    }

    .bounce {
      animation: bounce 0.5s infinite;
    }

    @keyframes bounce {
      50% { transform: translateY(-20px); }
    }

    .day-bar {
      width: 80%;
      height: 30px;
      background: #eee;
      margin: 10px auto 30px;
      border-radius: 20px;
    }

    .day-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #4caf50, #8bc34a);
    }

    #totalFill {
      background: linear-gradient(to right, orange, gold);
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid #ccc;
      padding: 8px 12px;
    }

    #celebration {
      position: fixed;
      top: 100px;
      width: 100%;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="bg-title">Stu's Retirement</div>
<div id="moodEmoji">😩</div>
<div id="celebration"></div>

<h1 id="countdown"></h1>

<label>Leave Days: </label>
<input type="number" id="leaveInput" value="15">

<h3>🟢 Today's Work Progress (9:00–17:00)</h3>
<div id="dayPercentText"></div>

<div class="day-bar">
  <div class="day-fill" id="dayFill"></div>
</div>

<h3>🟠 Career Progress (01/04/2002 → Retirement)</h3>
<div id="totalDaysText"></div>

<div class="day-bar">
  <div class="day-fill" id="totalFill"></div>
</div>

<table>
<tr><th>Metric</th><th>Value</th></tr>
<tr><td>🇬🇧 Working Days</td><td id="workdays"></td></tr>
<tr><td>⏱ Working Hours</td><td id="workhours"></td></tr>
<tr><td>☿ Mercury Days</td><td id="mercuryDays"></td></tr>
<tr><td>👶 Births</td><td id="births"></td></tr>
<tr><td>⚰️ Deaths</td><td id="deaths"></td></tr>
<tr><td>💰 Future Paydays</td><td id="paydays"></td></tr>
<tr><td>💷 Paychecks Stolen</td><td id="earnedPay"></td></tr>
<tr><td>🗑 Bin Days</td><td id="bins"></td></tr>
<tr><td>🌑 Moon Cycles</td><td id="moon"></td></tr>
<tr><td>🎬 Movies</td><td id="movies"></td></tr>
<tr><td>📺 EastEnders</td><td id="ee"></td></tr>
</table>

<script>
const targetDate = new Date("2026-07-28T16:30:00");
const startDate = new Date("2002-04-01");

const MERCURY_DAY_MS = 176*24*60*60*1000;
const BIRTHS_PER_DAY = 1800;
const DEATHS_PER_DAY = 1700;

const bankHolidays = [
  "2026-04-03","2026-04-06","2026-05-04","2026-05-25"
];

setInterval(update,1000);
update();

function update(){
  const now = new Date();
  const diff = targetDate - now;

  // COUNTDOWN
  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff/3600000 % 24);
  const m = Math.floor(diff/60000 % 60);
  const s = Math.floor(diff/1000 % 60);

  countdown.innerText = `${d}d ${pad(h)}:${pad(m)}:${pad(s)}`;

  // DAY PROGRESS
  const start = new Date(now); start.setHours(9,0,0,0);
  const lunchStart = new Date(now); lunchStart.setHours(12,30,0,0);
  const lunchEnd = new Date(now); lunchEnd.setHours(13,30,0,0);
  const end = new Date(now); end.setHours(17,0,0,0);

  const totalWork = (lunchStart-start)+(end-lunchEnd);

  let worked=0;
  if(now<=start) worked=0;
  else if(now<lunchStart) worked=now-start;
  else if(now<=lunchEnd) worked=lunchStart-start;
  else if(now<end) worked=(lunchStart-start)+(now-lunchEnd);
  else worked=totalWork;

  const percent = (worked/totalWork)*100;

  dayFill.style.width = percent+"%";
  dayPercentText.innerText = percent.toFixed(1)+"% complete today";

  // EMOJI
  if(percent<25) moodEmoji.innerText="😩";
  else if(percent<50) moodEmoji.innerText="😐";
  else if(percent<75) moodEmoji.innerText="😊";
  else moodEmoji.innerText="🤩";

  if(percent>90) moodEmoji.classList.add("bounce");
  else moodEmoji.classList.remove("bounce");

  // TOTAL CAREER
  const totalPercent = ((now-startDate)/(targetDate-startDate))*100;
  totalFill.style.width = totalPercent+"%";

  totalDaysText.innerText =
    `${d} days remaining | ${totalPercent.toFixed(1)}% of career complete`;

  // WORKING DAYS
  let wd=0, t=new Date(now);
  while(t<targetDate){
    t.setDate(t.getDate()+1);
    if(t.getDay()>0 && t.getDay()<6 &&
       !bankHolidays.includes(t.toISOString().split("T")[0])) wd++;
  }

  const leave = Number(leaveInput.value)||0;
  wd = Math.max(0, wd - leave);

  workdays.innerText=wd;
  workhours.innerText=wd*7;

  // OTHER METRICS
  const daysLeft = diff/86400000;

  mercuryDays.innerText=(diff/MERCURY_DAY_MS).toFixed(4);
  births.innerText=Math.floor(daysLeft*BIRTHS_PER_DAY).toLocaleString();
  deaths.innerText=Math.floor(daysLeft*DEATHS_PER_DAY).toLocaleString();

  // PAYDAYS FUTURE
  let pd=0, p=new Date(now);
  while(p<targetDate){
    if(p.getDate()==28) pd++;
    p.setDate(p.getDate()+1);
  }
  paydays.innerText=pd;

  // PAYCHECKS EARNED
  let earned=0, e=new Date(startDate);
  while(e<now){
    if(e.getDate()==28) earned++;
    e.setDate(e.getDate()+1);
  }
  earnedPay.innerText=earned;

  // BIN DAYS
 let binCount = 0;
let b = new Date("2026-03-20");

while(b < targetDate){
  if(b > now) binCount++;
  b.setDate(b.getDate() + 14);
}

document.getElementById("bins").innerText = binCount; 
  // MOON
  moon.innerText=Math.floor(diff/(29.53*86400000));

  // MOVIES
  movies.innerText=Math.floor(diff/(2*3600000));

  // EASTENDERS
  let ee=0, ed=new Date(now);
  while(ed<targetDate){
    ed.setDate(ed.getDate()+1);
    if(ed.getDay()>=1 && ed.getDay()<=4) ee++;
  }
  document.getElementById("ee").innerText=ee;

  // CELEBRATION
  if(now.getHours()==9 && now.getMinutes()<5){
    spawnConfetti();
  }
}

function spawnConfetti(){
  for(let i=0;i<4;i++){
    const el=document.createElement("div");
    el.innerText="🎉";
    el.style.position="absolute";
    el.style.left=Math.random()*100+"%";
    celebration.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  }
}

function pad(n){return n.toString().padStart(2,'0');}
</script>

</body>
</html>
