<!DOCTYPE html>
<html>

<head>
  <title>Stu's Retirement Countdown</title>

  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      margin-top: 40px;
      padding-top: 80px; /* ensures content doesn't overlap watermark */
    }

    #countdown { font-size: 2rem; margin-top: 20px; }

    input, button { padding: 10px; margin-top: 10px; }

    table { margin: 30px auto; border-collapse: collapse; }
    td, th { border: 1px solid #ccc; padding: 10px 15px; }

    /* ✅ TOP-LEFT WATERMARK */
    #bg-title {
      position: fixed;
      top: 10px;
      left: 15px;
      font-size: 4rem;
      color: rgba(0,0,0,0.08);
      z-index: 0;
      pointer-events: none;
      user-select: none;
    }

    /* ensure main content is above watermark */
    body > * {
      position: relative;
      z-index: 1;
    }

    .day-bar {
      width: 80%;
      height: 30px;
      background: #eee;
      margin: 20px auto;
      border-radius: 20px;
      position: relative;
    }

    .day-fill {
      height: 100%;
      background: #4caf50;
      border-radius: 20px;
      width: 0%;
    }

    .day-marker {
      position: absolute;
      top: -10px;
      width: 4px;
      height: 50px;
      background: blue;
    }

    #dayPercentText {
      font-size: 1.4rem;
      font-weight: bold;
      margin-top: 15px;
    }

    .moon-img { width: 120px; margin-top: 20px; }
  </style>
</head>

<body>

<div id="bg-title">Stu's Retirement</div>

<h2>Select a target date:</h2>
<input type="datetime-local" id="targetInput"><br>

<label>Leave days remaining:</label><br>
<input type="number" id="leaveDays" value="0"><br>

<button onclick="startCountdown()">Start Countdown</button>

<h1 id="countdown"></h1>

<img id="moonImage" class="moon-img">

<div id="dayPercentText">0% of today completed</div>

<div class="day-bar">
  <div class="day-fill" id="dayFill"></div>
  <div class="day-marker" id="dayMarker"></div>
</div>

<table>
<tr><th>Metric</th><th>Value</th></tr>
<tr><td>🇬🇧 Working Days</td><td id="workdays"></td></tr>
<tr><td>⏱ Working Hours</td><td id="workhours"></td></tr>
<tr><td>👶 UK Births</td><td id="births"></td></tr>
<tr><td>⚰️ UK Deaths</td><td id="deaths"></td></tr>
<tr><td>💰 Paydays</td><td id="paydays"></td></tr>
<tr><td>🗑 Bin Days</td><td id="bins"></td></tr>
<tr><td>🌑 Moon Cycles</td><td id="moonCycles"></td></tr>
<tr><td>🎬 Movies</td><td id="movies"></td></tr>
</table>

<script>
let targetDate, timer;

const BIRTHS_PER_DAY = 1800;
const DEATHS_PER_DAY = 1700;

const moonImages = [
  "https://svs.gsfc.nasa.gov/vis/a000000/a005000/a005048/frames/730x730_1x1_30p/moon.0001.jpg",
  "https://svs.gsfc.nasa.gov/vis/a000000/a005000/a005048/frames/730x730_1x1_30p/moon.0010.jpg",
  "https://svs.gsfc.nasa.gov/vis/a000000/a005000/a005048/frames/730x730_1x1_30p/moon.0020.jpg",
  "https://svs.gsfc.nasa.gov/vis/a000000/a005000/a005048/frames/730x730_1x1_30p/moon.0030.jpg"
];

function startCountdown(){
  const val = document.getElementById("targetInput").value;
  if(!val) return alert("Pick a date");

  targetDate = new Date(val);

  if(timer) clearInterval(timer);
  timer = setInterval(updateCountdown,1000);

  updateCountdown();
}

document.getElementById("leaveDays").addEventListener("input", () => {
  if(targetDate) updateCountdown();
});

function updateCountdown(){
  const now = new Date();
  const diff = targetDate - now;

  if(diff <= 0){
    document.getElementById("countdown").innerHTML = "Time's up!";
    clearInterval(timer);
    return;
  }

  const seconds = Math.floor(diff/1000);
  const minutes = Math.floor(seconds/60);
  const hours = Math.floor(minutes/60);
  const days = Math.floor(hours/24);

  document.getElementById("countdown").innerHTML =
    `${days} days ${pad(hours%24)}:${pad(minutes%60)}:${pad(seconds%60)}`;

  // 🌙 moon
  const cycle = 29.53;
  const phase = ((now/(1000*60*60*24)) % cycle)/cycle;
  document.getElementById("moonImage").src =
    moonImages[Math.floor(phase * moonImages.length)];

  // 🧮 working days
  let wd=0;
  let t=new Date(now);

  while(t<targetDate){
    t.setDate(t.getDate()+1);
    if(t.getDay()!=0 && t.getDay()!=6) wd++;
  }

  let leave = Number(document.getElementById("leaveDays").value) || 0;
  wd = Math.max(0, wd - leave);

  document.getElementById("workdays").innerHTML=wd;
  document.getElementById("workhours").innerHTML = wd * 7;

  // 👶 births & ⚰️ deaths
  const totalDays = diff / (1000*60*60*24);
  document.getElementById("births").innerHTML =
    Math.floor(totalDays * BIRTHS_PER_DAY).toLocaleString();
  document.getElementById("deaths").innerHTML =
    Math.floor(totalDays * DEATHS_PER_DAY).toLocaleString();

  // 🎯 daily progress
  const start = new Date(now); start.setHours(9,0,0);
  const lunchStart = new Date(now); lunchStart.setHours(12,30,0);
  const lunchEnd = new Date(now); lunchEnd.setHours(13,30,0);
  const end = new Date(now); end.setHours(17,0,0);

  let percent = 0;

  if(now < start) percent = 0;
  else if(now > end) percent = 100;
  else {
    let worked = 0;

    if(now < lunchStart){
      worked = now - start;
    } else if(now < lunchEnd){
      worked = lunchStart - start;
    } else {
      worked = (lunchStart - start) + (now - lunchEnd);
    }

    const total = (lunchStart - start) + (end - lunchEnd);
    percent = (worked / total) * 100;
  }

  document.getElementById("dayFill").style.width = percent + "%";
  document.getElementById("dayMarker").style.left = percent + "%";

  document.getElementById("dayPercentText").innerText =
    percent.toFixed(1) + "% of today completed";

  // 💰 paydays
  let pd=0;
  let d2=new Date(now);
  while(d2<targetDate){
    if(d2.getDate()==28) pd++;
    d2.setDate(d2.getDate()+1);
  }
  document.getElementById("paydays").innerHTML=pd;

  // 🗑 bins
  const ref=new Date("2026-03-20");
  let bins=0;
  let b=new Date(ref);

  while(b<targetDate){
    if(b>now) bins++;
    b.setDate(b.getDate()+14);
  }
  document.getElementById("bins").innerHTML=bins;

  // 🌑 moon cycles
  document.getElementById("moonCycles").innerHTML =
    Math.floor(diff/(29.53*86400000));

  // 🎬 movies
  document.getElementById("movies").innerHTML =
    Math.floor(diff/(2*3600000));
}

function pad(n){return n.toString().padStart(2,'0');}
</script>

</body>
</html>
